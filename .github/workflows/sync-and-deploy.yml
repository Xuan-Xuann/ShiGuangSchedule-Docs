name: 自动同步学校索引

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

# 全局环境变量，解决弃用警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # 修改这里，从 20 改为 24

      - name: Install dependencies
        # 即使你的脚本目前是零依赖，npm install 也是个好习惯
        # 如果你确实没用任何包，这行可以不写
        run: npm install 

      - name: Run Sync Script
        run: node tools/sync-schools.cjs

      - name: Commit and Push (Forced Test)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/guide/user/adapted-school.md
          # 强制 commit，不管有没有变动
          git commit -m "chore: 强制触发同步测试" || echo "No changes"
          git push
